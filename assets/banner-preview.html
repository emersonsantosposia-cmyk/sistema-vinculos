<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prévia do banner institucional</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1a1a1a;
      padding: 2rem;
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: #c9bfa3;
    }
    .wrap { width: min(960px, 100%); display: grid; gap: 1rem; }
    h1 { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .banner {
      position: relative;
      width: 100%;
      aspect-ratio: 2048 / 460;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 4px;
    }
    .banner__bg {
      position: absolute;
      top: 0;
      left: 50%;
      height: 100%;
      width: 240%;
      max-width: none;
      transform: translateX(-50%);
      object-fit: cover;
      object-position: center;
    }
    .banner__logo {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 72%;
      width: auto;
      object-fit: contain;
      z-index: 2;
    }
    .banner__logo--lince { left: 2.5%; }
    .banner__logo--ppf { right: 2%; height: 78%; }
    .banner__title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 22%;
      text-align: center;
      z-index: 3;
      font-size: clamp(0.65rem, 2.1vw, 1.35rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #d4af37;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.85);
    }
    .note { font-size: 0.8rem; line-height: 1.5; color: #8a846f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prévia — banner institucional</h1>
    <div class="banner" role="img" aria-label="Sistema de contrainteligência">
      <img class="banner__bg" src="../public/rede-lince-institucional.png" alt="" />
      <img
        class="banner__logo banner__logo--lince"
        src="c__Users_moura_AppData_Roaming_Cursor_User_workspaceStorage_7b35688771ddcbd8d13166a35f4d4c5b_images_davinci__img1__LINCE-50ecfc15-6bc2-4708-aa2c-c8e5677dae17.png"
        alt="Rede Lince"
      />
      <img
        class="banner__logo banner__logo--ppf"
        src="c__Users_moura_AppData_Roaming_Cursor_User_workspaceStorage_7b35688771ddcbd8d13166a35f4d4c5b_images_davinci__img1__PPF-2865840e-3fad-4f15-a00c-cd89c5ce5185.png"
        alt="PPF"
      />
      <p class="banner__title">Sistema de contrainteligência</p>
    </div>
    <p class="note">
      Proporção 2048×460 · fundo institucional centralizado · Rede Lince à esquerda · PPF à direita · texto central preservado.
    </p>
  </div>
</body>
</html>
